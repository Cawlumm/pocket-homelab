[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
max_http_request_size = 4294967296
bind_address = 0.0.0.0

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600

# NOTE: the CouchDB admin account is NOT stored here.
# Set it on first boot via COUCHDB_USER / COUCHDB_PASSWORD in this stack's .env
# (see .env.example). CouchDB writes the hashed admin into its own runtime
# config file, which is gitignored — so no password hash ever lands in git.
