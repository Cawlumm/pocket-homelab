services:
  couchdb:
    image: couchdb:latest
    container_name: couchdb
    restart: unless-stopped
    env_file: .env
    mem_limit: 256m
    ports:
      - "5984:5984"
    volumes:
      - ../../volumes/obsidian-livesync/data:/opt/couchdb/data
      - ./config:/opt/couchdb/etc/local.d
    networks:
      - backend
networks:
  backend:
    external: true
